<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♥ mrinalinikeskar ♥</title>
    <style>
        body {
            font-family: JetBrains Mono, monspace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, lightgrey, #FFE6E5);
        }
        .container {
            position: relative;
            text-align: center;
        }
        .heart-image {
            width: 150px;
            height: 150px;
            display: block;
            margin: 0 auto;
        }
        .enter-link {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            color: #666363;
            transition: transform 0.4s ease; /* Smooth transition */
        }
        .enter-link:hover {
            color: lightpink;
        }
        /* Links that are always pink */
        .always-pink {
            color: pink; /* Always pink */
            text-decoration: none; /* Optional: Remove underline */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="heart.png" alt="Pink Heart" class="heart-image">
        <a href="homepage.html" class="enter-link">enter</a>
    </div>
</body>
</html>
